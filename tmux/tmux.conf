# Enable 256-color and true-color (24-bit) support in tmux

set -g default-terminal "screen-256color" # Set terminal type for 256-color
set -ga terminal-overrides ",_256col_:Tc" # Override to enable true-color

set -g set-clipboard on # Use system clipboard
set -g detach-on-destroy on # Exit tmux when closing a session
set -g escape-time 0 # Remove delay for exiting insert mode with
set -g history-limit 1000000 # Increase history size (default: 2,000)
set -g mouse on # Enable mouse support
set -g status-interval 3 # Update the status bar every 3 seconds
set -g allow-passthrough on # Allow programs in the pane to bypass tmux (e.g. image preview)
set -g visual-activity off
set -g status-position bottom

# Set prefix key
# unbind C-b # Unbind default prefix key
# set -g prefix C-space # Set new prefix to Ctrl+Space

# Refresh tmux config with r
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Split horizontally in CWD with '\'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
# Split vertically in CWD with '-'
unbind \"
bind - split-window -c "#{pane_current_path}"

# New window in same path to 'c'
bind c new-window -c "#{pane_current_path}"

# Use vim arrow key to resize (inside vim, but not terminal)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Smart pane switching with awareness of Vim
bind -n C-h if-shell 'tmux display-message -p "#{pane_current_command}" | grep -iq vim' \
 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell 'tmux display-message -p "#{pane_current_command}" | grep -iq vim' \
 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell 'tmux display-message -p "#{pane_current_command}" | grep -iq vim' \
 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell 'tmux display-message -p "#{pane_current_command}" | grep -iq vim' \
 'send-keys C-l' 'select-pane -R'

# Use m key to maximize pane
bind -r m resize-pane -Z

# Enable vi mode to allow us to use vim keys to move around in copy mode
# (Predix + [ places us in copy mode)
set-window-option -g mode-keys vi

# Start selecting text with 'v'
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Copy text with 'y' (uses tmux-yank under the hood)
bind-key -T copy-mode-vi y send-keys -X copy-selection

# Don't exit copy mode when dragging with mouse, but do copy the text
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection -x

# Allow OSC 52 passthrough for clipboard over SSH
# set -ga terminal-overrides ",_256col_:Tc:Ms=\\E]52;c;%p2%s\\007"

# Allow OSC 52 passthrough for clipboard over SSH
set -ag terminal-overrides ",_:Ms=\\E]52;c;%p2%s\\007"
set -as terminal-features ',_:clipboard'

# Paste yanked text with "Prefix + P" ("Prefix + p" goes to previous window)
bind P paste-buffer

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on # Automatically renumber windows when one is closed

# Auto-install tpm if not found
if "test ! -d ~/.config/tmux/plugins/tpm" \
 "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# tpm plugin manager
set -g @plugin "tmux-plugins/tpm"

# List of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # Enable navigating between nvim and tmux
set -g @plugin 'tmux-plugins/tmux-resurrect' # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # Automatically saves sessions every 15 minutes
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor' # CPU and memory info
set -g @plugin 'tmux-plugins/tmux-yank'

# Style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold]#S | #[fg=${gray_light}, nobold] |"
set -g status-right "#{cpu} #{mem} "
set -g window-status-current-format "#[fg=${cyan_soft}, bold]  #{underscore}#I:#W"
set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light}, bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${gray_medium}"

# Resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continumm-boot 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
